<!-- SHOP SECTION -->

<section class="section">


<div class="container">


<h1 class="section-title">

Our Collection

</h1>

<!-- SEARCH -->

<div class="search-box">


<input

type="text"

id="searchInput"

class="form-control"

placeholder="Search product..."

onkeyup="searchProducts()">



</div>






<!-- CATEGORY FILTER -->

<div class="category-filter">


<button

class="btn"

onclick="filterCategory('All')">

All

</button>



<button

class="btn"

onclick="filterCategory('Men')">

Men

</button>



<button

class="btn"

onclick="filterCategory('Women')">

Women

</button>



<button

class="btn"

onclick="filterCategory('Kids')">

Kids

</button>



<button

class="btn"

onclick="filterCategory('Sports')">

Sports

</button>



</div>






<!-- SORT PRODUCTS -->


<div class="form-group">


<label>

Sort Products

</label>



<select

id="sortProducts"

class="form-control"

onchange="sortProducts()">



<option value="default">

Default

</option>



<option value="low">

Price Low To High

</option>



<option value="high">

Price High To Low

</option>



</select>


</div>

<!-- PRODUCT GRID -->


<div

class="product-grid"

id="productContainer">


</div>



</div>


</section>
